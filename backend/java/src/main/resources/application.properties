
# 服务器配置
server.port=8080

# ==================== H2 内存数据库配置（开发/演示） ====================
spring.datasource.url=jdbc:h2:mem:xinjiang_culture;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 控制台配置
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==================== MySQL 数据库配置（生产环境，取消注释即可使用） ====================
# spring.datasource.url=jdbc:mysql://localhost:3306/xinjiang_culture?useUnicode=true&amp;characterEncoding=utf8&amp;useSSL=false&amp;serverTimezone=Asia/Shanghai
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password

# JPA/Hibernate 配置
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# 生产环境使用MySQL方言：
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

